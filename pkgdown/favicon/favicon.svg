<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 181 209" width="181" height="209"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description><dc:creator>RealFaviconGenerator</dc:creator><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description></rdf:RDF></metadata><defs>
    <!-- Hex clip path -->
    <clipPath id="hex-clip">
      <polygon points="90.5,1 180,53 180,157 90.5,208 1,157 1,53"></polygon>
    </clipPath>

    <!-- Background gradient: deep navy -->
    <linearGradient id="bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0e1f42"></stop>
      <stop offset="100%" stop-color="#122a5c"></stop>
    </linearGradient>

    <!-- Gold accent gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8960c"></stop>
      <stop offset="100%" stop-color="#f5c842"></stop>
    </linearGradient>

    <!-- Teal glow gradient for X -->
    <linearGradient id="xgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4b8"></stop>
      <stop offset="100%" stop-color="#00a896"></stop>
    </linearGradient>

    <!-- Subtle inner glow for X -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
